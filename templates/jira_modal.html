<!-- ═══════════════════════════════════════════════════════════
     JIRA SHIP MODAL — Shared between ticket.html and bso.html
     Hierarchy-aware: issue type determines valid parents/epics
     ═══════════════════════════════════════════════════════════ -->

<style>
    .jira-modal-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
        z-index: 2000; justify-content: center; align-items: center;
    }
    .jira-modal-overlay.open { display: flex; }

    .jira-modal {
        background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border);
        width: 560px; max-width: 94vw; max-height: 88vh; overflow-y: auto;
        box-shadow: var(--shadow-lg), 0 20px 60px rgba(0,0,0,0.12);
        animation: jiraSlideUp 0.2s ease-out;
    }
    @keyframes jiraSlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .jira-modal-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 18px 24px; border-bottom: 1px solid var(--border);
    }
    .jira-modal-header h2 { font-size: 1em; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .jira-modal-header .jira-logo { background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; font-weight: 700; }
    .jira-modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: var(--radius); }
    .jira-modal-close:hover { background: var(--border-light); color: var(--text); }

    .jira-modal-body { padding: 20px 24px; }
    .jira-modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }

    .jira-field { margin-bottom: 16px; }
    .jira-field label { display: block; font-size: 0.72em; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
    .jira-field select, .jira-field input[type="text"] {
        width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
        font-size: 0.9em; color: var(--text); background: var(--card); font-family: inherit;
    }
    .jira-field select:focus, .jira-field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(80,70,229,0.08); }
    .jira-field .jira-hint { font-size: 0.78em; color: var(--text-muted); margin-top: 4px; }
    .jira-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .jira-hierarchy-info { background: var(--primary-bg); border: 1px solid #c7d2fe; border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; font-size: 0.82em; color: var(--primary); display: none; align-items: center; gap: 8px; }

    .jira-loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--text-muted); font-size: 0.88em; }
    .jira-loading .spinner { width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .jira-error { background: var(--danger-bg); border: 1px solid #fecaca; border-radius: var(--radius); padding: 12px; color: #991b1b; font-size: 0.88em; text-align: center; }
    .jira-suggested { font-size: 0.72em; font-weight: 600; background: var(--primary-bg); color: var(--primary); padding: 1px 6px; border-radius: 3px; margin-left: 4px; }

    /* ── Parent search results ── */
    .jira-parent-wrap { position: relative; }
    .jira-parent-results {
        position: absolute; top: 100%; left: 0; right: 0; background: var(--card);
        border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg);
        max-height: 220px; overflow-y: auto; z-index: 10; display: none; margin-top: 2px;
    }
    .jira-parent-results.open { display: block; }
    .jira-parent-item { padding: 9px 12px; cursor: pointer; font-size: 0.85em; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 8px; }
    .jira-parent-item:hover { background: var(--primary-bg); }
    .jira-parent-item:last-child { border-bottom: none; }

    .jira-type-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72em; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; flex-shrink: 0; }
    .jira-type-badge-epic { background: #ede9fe; color: #5b21b6; }
    .jira-type-badge-story { background: #dcfce7; color: #166534; }
    .jira-type-badge-task { background: #dbeafe; color: #1e40af; }
    .jira-type-badge-bug { background: #fee2e2; color: #991b1b; }
    .jira-type-badge-default { background: #f1f5f9; color: #475569; }

    .jira-parent-key { font-weight: 700; color: var(--primary); white-space: nowrap; flex-shrink: 0; }
    .jira-parent-summary { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .jira-parent-status { font-size: 0.7em; font-weight: 600; padding: 1px 5px; border-radius: 3px; background: var(--border-light); color: var(--text-muted); white-space: nowrap; flex-shrink: 0; margin-left: auto; }

    .jira-selected-parent { display: flex; align-items: center; gap: 8px; background: var(--primary-bg); border: 1px solid #c7d2fe; border-radius: 7px; padding: 8px 12px; margin-top: 6px; font-size: 0.85em; }
    .jira-clear-parent { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; padding: 2px; border-radius: 3px; flex-shrink: 0; }
    .jira-clear-parent:hover { color: var(--danger); background: var(--danger-bg); }

    .jira-debug-bar { background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius); padding: 8px 12px; margin-bottom: 12px; font-size: 0.72em; color: #92400e; font-family: 'JetBrains Mono', monospace; display: none; word-break: break-word; line-height: 1.5; }
</style>

<!-- MODAL -->
<div class="jira-modal-overlay" id="jira-modal-overlay" onclick="if(event.target===this) closeJiraModal();">
    <div class="jira-modal">
        <div class="jira-modal-header">
            <h2><span class="jira-logo">J</span> Ship to Jira</h2>
            <button class="jira-modal-close" onclick="closeJiraModal();">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div id="jira-modal-loading" class="jira-loading">
            <div class="spinner"></div> Loading Jira project options...
        </div>

        <div id="jira-modal-error" style="display:none; padding: 20px 24px;">
            <div class="jira-error" id="jira-modal-error-msg"></div>
        </div>

        <div id="jira-modal-form" style="display:none;">
            <div class="jira-modal-body">
                <!-- Debug bar (hidden by default, shows API issues) -->
                <div class="jira-debug-bar" id="jira-debug-bar"></div>

                <!-- Summary -->
                <div class="jira-field">
                    <label>Summary</label>
                    <input type="text" id="jira-f-summary" placeholder="[FD#123] Ticket subject...">
                </div>

                <!-- Issue Type + Priority -->
                <div class="jira-field-row">
                    <div class="jira-field">
                        <label>Issue Type</label>
                        <select id="jira-f-issuetype"></select>
                        <div class="jira-hint" id="jira-issuetype-hint"></div>
                    </div>
                    <div class="jira-field">
                        <label>Priority</label>
                        <select id="jira-f-priority"></select>
                        <div class="jira-hint" id="jira-priority-hint"></div>
                    </div>
                </div>

                <!-- Hierarchy info banner -->
                <div class="jira-hierarchy-info" id="jira-hierarchy-info">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    <span id="jira-hierarchy-text"></span>
                </div>

                <!-- Epic -->
                <div class="jira-field" id="jira-epic-field">
                    <label>Epic <span style="font-weight:400;text-transform:none;color:var(--text-muted);">(optional — link under an epic)</span></label>
                    <select id="jira-f-epic">
                        <option value="">— No epic —</option>
                    </select>
                </div>

                <!-- Parent ticket search -->
                <div class="jira-field jira-parent-wrap" id="jira-parent-field" style="display:none;">
                    <label id="jira-parent-label">Parent Ticket <span style="font-weight:400;text-transform:none;color:var(--text-muted);">(optional)</span></label>
                    <input type="text" id="jira-f-parent-search" placeholder="Search by key or summary..." autocomplete="off">
                    <input type="hidden" id="jira-f-parent-key" value="">
                    <div class="jira-parent-results" id="jira-parent-results"></div>
                    <div id="jira-selected-parent-chip" style="display:none;" class="jira-selected-parent">
                        <span class="jira-type-badge" id="jira-chip-type-badge"></span>
                        <span class="jira-parent-key" id="jira-chip-key"></span>
                        <span class="jira-parent-summary" id="jira-chip-summary"></span>
                        <button type="button" class="jira-clear-parent" onclick="clearParentSelection();">&times;</button>
                    </div>
                    <div class="jira-hint" id="jira-parent-hint">Type at least 2 characters to search</div>
                </div>

                <!-- Components -->
                <div class="jira-field" id="jira-components-field" style="display:none;">
                    <label>Components <span style="font-weight:400;text-transform:none;color:var(--text-muted);">(optional)</span></label>
                    <select id="jira-f-components" multiple style="min-height:60px;"></select>
                    <div class="jira-hint">Hold Ctrl/Cmd to select multiple</div>
                </div>

                <!-- Labels -->
                <div class="jira-field">
                    <label>Extra Labels <span style="font-weight:400;text-transform:none;color:var(--text-muted);">(optional)</span></label>
                    <input type="text" id="jira-f-labels" placeholder="label1, label2, ...">
                    <div class="jira-hint">Comma-separated. Auto-labels (freshdesk_ID, template) are always added.</div>
                </div>
            </div>

            <div class="jira-modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeJiraModal();">Cancel</button>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span id="jira-create-status" style="font-size:0.8em;color:var(--text-muted);"></span>
                    <button type="button" class="btn btn-primary" id="jira-create-btn" onclick="submitJiraCreate();">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                        Create Ticket
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // ═══════════════════════════════════════════════════════════
    // JIRA MODAL — All logic in one clean scope
    // ═══════════════════════════════════════════════════════════
    var _jiraModalTicketId = null;
    var _jiraModalCallback = null;
    var _parentSearchTimeout = null;
    var _allIssueTypes = [];

    var CLASSIFICATION_MAP = {
        'bug': 'Bug', 'feature_request': 'Feature request', 'enhancement': 'Feature request',
        'how_to': 'Customer request', 'sync': 'Bug', 'data': 'Bug', 'other': 'Customer request',
    };
    var RISK_PRIORITY_MAP = {
        'low': 'Low Priority', 'medium': 'Normal Prio', 'high': 'High Priority',
        'critical': 'High Priority', 'urgent': 'High Priority',
    };

    function typeBadgeClass(typeName) {
        var n = (typeName || '').toLowerCase();
        if (n === 'epic') return 'jira-type-badge-epic';
        if (n.indexOf('story') >= 0) return 'jira-type-badge-story';
        if (n === 'bug') return 'jira-type-badge-bug';
        if (n.indexOf('task') >= 0) return 'jira-type-badge-task';
        return 'jira-type-badge-default';
    }

    function showDebug(msg) {
        var bar = document.getElementById('jira-debug-bar');
        if (bar) { bar.style.display = 'block'; bar.textContent = msg; }
        console.warn('[Jira Modal] ' + msg);
    }

    // ── Determine what parent/epic fields to show ──
    function updateFieldsForIssueType() {
        var selectedType = document.getElementById('jira-f-issuetype').value;
        var epicField = document.getElementById('jira-epic-field');
        var parentField = document.getElementById('jira-parent-field');
        var hierarchyInfo = document.getElementById('jira-hierarchy-info');
        var hierarchyText = document.getElementById('jira-hierarchy-text');

        // Find this type's info
        var typeInfo = null;
        for (var i = 0; i < _allIssueTypes.length; i++) {
            if (_allIssueTypes[i].name === selectedType) { typeInfo = _allIssueTypes[i]; break; }
        }

        var isSubtask = typeInfo ? !!typeInfo.subtask : false;
        var isEpic = selectedType.toLowerCase() === 'epic' || (typeInfo && typeInfo.hierarchyLevel >= 1);

        // Reset
        clearParentSelection();

        if (isEpic) {
            // Creating an Epic — no parent/epic needed
            epicField.style.display = 'none';
            parentField.style.display = 'none';
            hierarchyInfo.style.display = 'flex';
            hierarchyText.textContent = 'Epics are top-level — no parent needed';
        } else if (isSubtask) {
            // Sub-task — needs a parent Story/Task/Bug, no epic
            epicField.style.display = 'none';
            parentField.style.display = 'block';
            parentField.dataset.parentTypes = _allIssueTypes
                .filter(function(t) { return !t.subtask && t.name.toLowerCase() !== 'epic'; })
                .map(function(t) { return t.name; }).join(',');
            parentField.dataset.required = '1';
            document.getElementById('jira-parent-label').innerHTML = 'Parent Ticket <span style="font-weight:400;text-transform:none;color:var(--text-muted);">— required for sub-tasks</span>';
            hierarchyInfo.style.display = 'flex';
            hierarchyText.textContent = 'Sub-tasks need a parent (Story, Task, or Bug)';
        } else {
            // Standard type (Story/Task/Bug/etc.) — show epic dropdown + optional parent search
            epicField.style.display = 'block';
            parentField.style.display = 'block';
            parentField.dataset.parentTypes = '';
            parentField.dataset.required = '0';
            document.getElementById('jira-parent-label').innerHTML = 'Parent / Epic <span style="font-weight:400;text-transform:none;color:var(--text-muted);">— search if not in epic dropdown</span>';
            hierarchyInfo.style.display = 'flex';
            hierarchyText.textContent = 'Link this ticket under an epic or another ticket';
        }
    }

    function clearParentSelection() {
        var s = document.getElementById('jira-f-parent-search');
        if (s) { s.value = ''; s.style.display = 'block'; }
        var k = document.getElementById('jira-f-parent-key');
        if (k) k.value = '';
        var chip = document.getElementById('jira-selected-parent-chip');
        if (chip) chip.style.display = 'none';
        var results = document.getElementById('jira-parent-results');
        if (results) results.classList.remove('open');
        var hint = document.getElementById('jira-parent-hint');
        if (hint) hint.textContent = 'Type at least 2 characters to search';
    }

    function selectParent(issue) {
        document.getElementById('jira-f-parent-key').value = issue.key;
        document.getElementById('jira-f-parent-search').style.display = 'none';
        document.getElementById('jira-parent-results').classList.remove('open');

        var chip = document.getElementById('jira-selected-parent-chip');
        var badge = document.getElementById('jira-chip-type-badge');
        badge.textContent = issue.type;
        badge.className = 'jira-type-badge ' + typeBadgeClass(issue.type);
        document.getElementById('jira-chip-key').textContent = issue.key;
        document.getElementById('jira-chip-summary').textContent = issue.summary;
        chip.style.display = 'flex';
        document.getElementById('jira-parent-hint').innerHTML = 'Selected: <strong>' + issue.key + '</strong> (' + issue.type + ')';
    }

    // ── Parent search input handler ──
    function onParentSearchInput() {
        var q = document.getElementById('jira-f-parent-search').value.trim();
        var resultsBox = document.getElementById('jira-parent-results');
        var parentField = document.getElementById('jira-parent-field');
        var hint = document.getElementById('jira-parent-hint');

        document.getElementById('jira-f-parent-key').value = '';

        if (q.length < 2) {
            resultsBox.classList.remove('open');
            resultsBox.innerHTML = '';
            hint.textContent = 'Type at least 2 characters to search';
            return;
        }

        hint.textContent = 'Searching...';

        clearTimeout(_parentSearchTimeout);
        _parentSearchTimeout = setTimeout(function() {
            var parentTypes = (parentField.dataset.parentTypes || '').trim();
            var url = '/api/jira/search-issues?q=' + encodeURIComponent(q);
            if (parentTypes) url += '&parent_types=' + encodeURIComponent(parentTypes);

            console.log('[Jira Modal] Searching:', url);

            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    console.log('[Jira Modal] Search result:', data);
                    resultsBox.innerHTML = '';

                    if (!data.ok) {
                        hint.textContent = 'Search error: ' + (data.message || 'unknown');
                        resultsBox.classList.remove('open');
                        return;
                    }

                    if (data.issues && data.issues.length > 0) {
                        data.issues.forEach(function(issue) {
                            var div = document.createElement('div');
                            div.className = 'jira-parent-item';
                            div.innerHTML =
                                '<span class="jira-type-badge ' + typeBadgeClass(issue.type) + '">' + (issue.type || '?') + '</span>' +
                                '<span class="jira-parent-key">' + issue.key + '</span>' +
                                '<span class="jira-parent-summary">' + (issue.summary || '') + '</span>' +
                                '<span class="jira-parent-status">' + (issue.status || '') + '</span>';
                            div.addEventListener('click', function() { selectParent(issue); });
                            resultsBox.appendChild(div);
                        });
                        resultsBox.classList.add('open');
                        hint.textContent = data.issues.length + ' result(s)';
                    } else {
                        resultsBox.classList.remove('open');
                        hint.textContent = 'No matching issues found';
                    }
                })
                .catch(function(err) {
                    console.error('[Jira Modal] Search failed:', err);
                    hint.textContent = 'Search failed: ' + err.message;
                    resultsBox.classList.remove('open');
                });
        }, 350);
    }

    // ═══════════════════════════════════════════════════════════
    // OPEN MODAL — exposed globally
    // ═══════════════════════════════════════════════════════════
    window.openJiraModal = function(ticketId, opts, callback) {
        opts = opts || {};
        _jiraModalTicketId = ticketId;
        _jiraModalCallback = callback || null;

        var overlay = document.getElementById('jira-modal-overlay');
        var loading = document.getElementById('jira-modal-loading');
        var error = document.getElementById('jira-modal-error');
        var form = document.getElementById('jira-modal-form');
        var debugBar = document.getElementById('jira-debug-bar');

        overlay.classList.add('open');
        loading.style.display = 'flex';
        error.style.display = 'none';
        form.style.display = 'none';
        if (debugBar) debugBar.style.display = 'none';

        document.getElementById('jira-f-summary').value = opts.subject
            ? '[FD#' + ticketId + '] ' + opts.subject
            : '[FD#' + ticketId + ']';

        clearParentSelection();

        // Attach parent search listener (safe to call multiple times)
        var searchInput = document.getElementById('jira-f-parent-search');
        searchInput.removeEventListener('input', onParentSearchInput);
        searchInput.addEventListener('input', onParentSearchInput);

        // ALWAYS fetch fresh data (no stale cache)
        console.log('[Jira Modal] Fetching /api/jira/options...');

        fetch('/api/jira/options')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                console.log('[Jira Modal] API response:', data);

                if (!data.ok) {
                    loading.style.display = 'none';
                    error.style.display = 'block';
                    document.getElementById('jira-modal-error-msg').textContent = data.message || 'Failed to load Jira options';
                    return;
                }

                loading.style.display = 'none';
                form.style.display = 'block';

                // Store issue types
                _allIssueTypes = data.issue_types || [];

                // Debug info — show API diagnostics
                var debugParts = [];
                debugParts.push((_allIssueTypes.length || 0) + ' types');
                debugParts.push((data.epics || []).length + ' epics');
                debugParts.push((data.priorities || []).length + ' priorities');
                debugParts.push((data.components || []).length + ' components');
                if (data.debug) debugParts.push('API: ' + data.debug);
                showDebug(debugParts.join(' | '));

                // Issue types
                var itSelect = document.getElementById('jira-f-issuetype');
                itSelect.innerHTML = '';
                var suggestedType = CLASSIFICATION_MAP[(opts.classification || '').toLowerCase()] || '';

                var standardTypes = [];
                var subtaskTypes = [];
                _allIssueTypes.forEach(function(it) {
                    if (it.subtask) subtaskTypes.push(it); else standardTypes.push(it);
                });

                standardTypes.forEach(function(it) {
                    var o = document.createElement('option');
                    o.value = it.name; o.textContent = it.name;
                    if (it.name === suggestedType) o.selected = true;
                    itSelect.appendChild(o);
                });
                if (subtaskTypes.length > 0) {
                    var og = document.createElement('optgroup');
                    og.label = 'Sub-task types';
                    subtaskTypes.forEach(function(it) {
                        var o = document.createElement('option');
                        o.value = it.name; o.textContent = it.name;
                        og.appendChild(o);
                    });
                    itSelect.appendChild(og);
                }

                var itHint = document.getElementById('jira-issuetype-hint');
                itHint.innerHTML = suggestedType ? 'Suggested: <span class="jira-suggested">' + suggestedType + '</span>' : '';

                // Priorities
                var prSelect = document.getElementById('jira-f-priority');
                prSelect.innerHTML = '';
                var suggestedPrio = RISK_PRIORITY_MAP[(opts.risk_level || '').toLowerCase()] || 'Normal Prio';
                (data.priorities || []).forEach(function(p) {
                    var o = document.createElement('option');
                    o.value = p.name; o.textContent = p.name;
                    if (p.name === suggestedPrio) o.selected = true;
                    prSelect.appendChild(o);
                });
                var prHint = document.getElementById('jira-priority-hint');
                prHint.innerHTML = suggestedPrio ? 'Suggested: <span class="jira-suggested">' + suggestedPrio + '</span>' : '';

                // Epics
                var epicSelect = document.getElementById('jira-f-epic');
                epicSelect.innerHTML = '<option value="">— No epic —</option>';
                (data.epics || []).forEach(function(ep) {
                    var o = document.createElement('option');
                    o.value = ep.key;
                    o.textContent = ep.key + ' — ' + ep.summary + (ep.status ? ' [' + ep.status + ']' : '');
                    epicSelect.appendChild(o);
                });
                console.log('[Jira Modal] Loaded ' + (data.epics || []).length + ' epics into dropdown');

                // Components
                var compField = document.getElementById('jira-components-field');
                var compSelect = document.getElementById('jira-f-components');
                if (data.components && data.components.length > 0) {
                    compField.style.display = 'block';
                    compSelect.innerHTML = '';
                    data.components.forEach(function(c) {
                        var o = document.createElement('option');
                        o.value = c.name; o.textContent = c.name;
                        compSelect.appendChild(o);
                    });
                } else {
                    compField.style.display = 'none';
                }

                // Reset
                document.getElementById('jira-f-labels').value = '';
                document.getElementById('jira-create-status').textContent = '';
                var createBtn = document.getElementById('jira-create-btn');
                createBtn.disabled = false;
                createBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14"/><path d="M5 12h14"/></svg> Create Ticket';

                // Wire issue type change
                itSelect.removeEventListener('change', updateFieldsForIssueType);
                itSelect.addEventListener('change', updateFieldsForIssueType);
                updateFieldsForIssueType();
            })
            .catch(function(err) {
                console.error('[Jira Modal] Fetch error:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                document.getElementById('jira-modal-error-msg').textContent = 'Network error: ' + err.message;
            });
    };

    window.closeJiraModal = function() {
        document.getElementById('jira-modal-overlay').classList.remove('open');
        _jiraModalTicketId = null;
        _jiraModalCallback = null;
    };

    window.clearParentSelection = clearParentSelection;

    // ═══════════════════════════════════════════════════════════
    // SUBMIT
    // ═══════════════════════════════════════════════════════════
    window.submitJiraCreate = function() {
        var btn = document.getElementById('jira-create-btn');
        var status = document.getElementById('jira-create-status');
        var parentField = document.getElementById('jira-parent-field');
        var parentKey = document.getElementById('jira-f-parent-key').value;

        // Validate parent if required
        if (parentField.style.display !== 'none' && parentField.dataset.required === '1' && !parentKey) {
            status.style.color = 'var(--danger)';
            status.textContent = 'Parent ticket is required for this issue type';
            return;
        }

        btn.disabled = true;
        status.textContent = 'Creating...';
        status.style.color = 'var(--text-muted)';

        var summary = document.getElementById('jira-f-summary').value.trim();
        var issueType = document.getElementById('jira-f-issuetype').value;
        var priority = document.getElementById('jira-f-priority').value;
        var epicKey = document.getElementById('jira-f-epic').value;
        var labelsRaw = document.getElementById('jira-f-labels').value;
        var labels = labelsRaw ? labelsRaw.split(',').map(function(l) { return l.trim(); }).filter(Boolean) : [];
        var compSelect = document.getElementById('jira-f-components');
        var components = Array.from(compSelect.selectedOptions).map(function(o) { return o.value; });

        var payload = {
            ticket_ids: [_jiraModalTicketId],
            issue_type: issueType, priority: priority,
            epic_key: epicKey, parent_key: parentKey,
            components: components, labels: labels, summary: summary,
        };

        var ticketRouteEl = document.querySelector('[data-jira-create-url]');
        var fetchPromise;

        if (ticketRouteEl) {
            var p = {}; for (var k in payload) { if (k !== 'ticket_ids') p[k] = payload[k]; }
            fetchPromise = fetch(ticketRouteEl.dataset.jiraCreateUrl, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p)
            }).then(function(r) { return r.json(); }).then(function(d) {
                return d.ok ? { ok: true, key: d.key, url: d.url } : { ok: false, message: d.message };
            });
        } else {
            fetchPromise = fetch('/api/bso/bulk-ship-jira', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok && d.results && d.results[0]) {
                    var r = d.results[0];
                    return { ok: r.ok, key: r.key, url: r.url, message: r.message };
                }
                return { ok: false, message: d.message || 'Unknown error' };
            });
        }

        fetchPromise.then(function(result) {
            if (result.ok) {
                status.style.color = 'var(--success)';
                status.textContent = 'Created ' + result.key;
                btn.textContent = 'Done!';
                if (_jiraModalCallback) _jiraModalCallback(result.key, result.url);
                setTimeout(function() { closeJiraModal(); window.location.reload(); }, 800);
            } else {
                status.style.color = 'var(--danger)';
                status.textContent = result.message || 'Creation failed';
                btn.disabled = false;
            }
        }).catch(function(err) {
            status.style.color = 'var(--danger)';
            status.textContent = 'Error: ' + err.message;
            btn.disabled = false;
        });
    };

    // Close on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('jira-modal-overlay').classList.contains('open')) {
            closeJiraModal();
        }
    });

    // Close parent results on outside click
    document.addEventListener('click', function(e) {
        var searchInput = document.getElementById('jira-f-parent-search');
        var resultsBox = document.getElementById('jira-parent-results');
        if (searchInput && resultsBox && !searchInput.contains(e.target) && !resultsBox.contains(e.target)) {
            resultsBox.classList.remove('open');
        }
    });
})();
</script>
